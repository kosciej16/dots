# prefer to install from precompiled binary

vars:
  nvimApp: "{{ appDir }}/nvim"

- name: Download nvim.appimage
  get_url:
    url: https://github.com/neovim/neovim/releases/latest/download/nvim.appimage
    dest: "{{ nvimApp }}"
    mode: 0777

- name: Add path variable for nvim
  block:
    - shell: "grep {{appDir}} ~/.profile"
    register: grep_output
    failed_when: false
    no_log: true
    - lineinfile:
    path: ~/.profile
    line: "export PATH=$PATH:{{ appDir }}"
    when: grep_output.stderr == ""

- name: Add nvim as defaults
  when:
    - ansible_facts['distribution'] == "Ubuntu"
    block:
      - name: Add nvim as default for editor
        alternatives:
          name: editor
          path: "{{ nvimApp }}"
          link: /usr/bin/editor
          priority: 60
      - name: Add nvim as default for vim
        alternatives:
          name: vim
          path: "{{ nvimApp }}"
          link: /usr/bin/vim
          priority: 60
    become: yes
    become_user: "{{ targetUser | default(ansible_user_id) }} "

- name: Install Plugin dependencies
  package:
    name: [git, curl, ripgrep, universal-ctags]
    state: present
  become: yes

